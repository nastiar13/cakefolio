version: '3.8'

services:
  app:
    build: .
    container_name: cakefolio-app
    restart: unless-stopped
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      
      # HTTPS Routing
      - "traefik.http.routers.cakefolio.rule=Host(`cakefolio.mitrabisnisdigital.com`)"
      - "traefik.http.routers.cakefolio.entrypoints=websecure"
      - "traefik.http.routers.cakefolio.tls=true"
      # If your global Traefik uses a specific cert resolver, ensure the name matches (e.g., 'letsencrypt' or 'myresolver'):
      - "traefik.http.routers.cakefolio.tls.certresolver=myresolver"
      # Explicit Service Mapping (like your MinIO example)
      - "traefik.http.routers.cakefolio.service=cakefolio-svc"
      - "traefik.http.services.cakefolio-svc.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
